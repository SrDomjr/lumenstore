# Perfil de Desarrollo
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lumenstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: mysql

  jpa:
    show-sql: true

cloudinary:
  enabled: ${CLOUDINARY_ENABLED:true}
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

cors:
  allowed-origins: http://localhost:4200,http://127.0.0.1:4200

logging:
  level:
    com.lumenstore: DEBUG
    org.hibernate.SQL: DEBUG
