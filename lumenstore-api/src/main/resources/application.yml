spring:
  application:
    name: lumenstore-api

  datasource:
    url: jdbc:mysql://localhost:3306/lumenstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root # ◄ Cambia por tu usuario real (ej: root)
    password: mysql # ◄ Cambia por tu contraseña real
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    enabled: true

server:
  port: 8080
