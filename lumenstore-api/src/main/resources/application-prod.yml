# Perfil de Produccion
# IMPORTANTE: Usa variables de entorno para valores sensibles.
#   export DB_PASSWORD="tu_password_real"
#   export JWT_SECRET="tu_clave_generada"
#   export CLOUDINARY_API_KEY="tu_api_key"
#   export CLOUDINARY_API_SECRET="tu_api_secret"

spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

cloudinary:
  enabled: ${CLOUDINARY_ENABLED:true}
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.lumenstore: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
