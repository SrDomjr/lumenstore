<!-- ─── ADMIN NAVBAR ─────────────────────────────── -->
<header class="app-header" *ngIf="isAdminRoute(); else storeNav">
  <div class="container header-inner admin-nav">
    <div class="brand-wrap">
      <a class="brand" routerLink="/admin/dashboard">Lumenstore</a>
    </div>

    <div class="header-actions">
      <a routerLink="/store" class="back-to-store">
        Volver a la tienda
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
      <ng-container *ngIf="auth.currentUser$ | async as user; else guestActions">
        <div class="profile-dropdown" tabindex="0">
          <button class="profile-btn btn-ghost" aria-haspopup="true" aria-expanded="false">
            <i class="fa-regular fa-user"></i>
            <span class="profile-name">{{ user.firstName }}</span>
            <i class="fa-solid fa-caret-down caret"></i>
          </button>
          <ul class="dropdown-menu" role="menu">
            <li role="none"><a role="menuitem" routerLink="/profile">Mi perfil</a></li>
            <li role="none"><a role="menuitem" routerLink="/orders">Pedidos</a></li>
            <li class="divider" role="separator"></li>
            <li role="none">
              <button role="menuitem" class="btn-ghost" (click)="onLogout()">Cerrar sesión</button>
            </li>
          </ul>
        </div>
      </ng-container>
      <ng-template #guestActions>
        <a routerLink="/profile" class="btn btn-ghost"><i class="fa-regular fa-user"></i></a>
        <a routerLink="/login" class="btn btn-primary">Ingresar</a>
      </ng-template>
    </div>
  </div>
</header>

<!-- ─── STORE NAVBAR ─────────────────────────────── -->
<ng-template #storeNav>
  <header class="app-header">
    <div class="container header-inner">
      <div class="brand-wrap">
        <a class="brand" routerLink="/store">Lumenstore</a>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <ul>
          <li><a routerLink="/home" routerLinkActive="active">Inicio</a></li>
          <li><a routerLink="/store" routerLinkActive="active">Tienda</a></li>
          <li><a routerLink="/orders" routerLinkActive="active">Pedidos</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button
          class="icon-link cart-link"
          (click)="cartService.toggleDrawer()"
          aria-label="Carrito"
        >
          <i class="fa-solid fa-cart-arrow-down"></i>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </button>
        <a routerLink="/wishlists" class="icon-link heart-link" aria-label="Favoritos">
          <i class="fa-regular fa-heart"></i>
        </a>
        <ng-container *ngIf="auth.currentUser$ | async as user; else guestActions2">
          <div class="profile-dropdown" tabindex="0">
            <button class="profile-btn btn-ghost" aria-haspopup="true" aria-expanded="false">
              <i class="fa-regular fa-user"></i>
              <span class="profile-name">{{ user.firstName }}</span>
              <i class="fa-solid fa-caret-down caret"></i>
            </button>
            <ul class="dropdown-menu" role="menu">
              <li role="none"><a role="menuitem" routerLink="/profile">Mi perfil</a></li>
              <li role="none"><a role="menuitem" routerLink="/wishlists">Favoritos</a></li>
              <li role="none"><a role="menuitem" routerLink="/orders">Pedidos</a></li>
              <li role="none" *ngIf="isAdmin()">
                <a role="menuitem" routerLink="/admin/dashboard">⚙️ Admin</a>
              </li>
              <li class="divider" role="separator"></li>
              <li role="none">
                <button role="menuitem" class="btn-ghost" (click)="onLogout()">
                  Cerrar sesión
                </button>
              </li>
            </ul>
          </div>
        </ng-container>
        <ng-template #guestActions2>
          <a routerLink="/profile" class="btn btn-ghost"><i class="fa-regular fa-user"></i></a>
          <a routerLink="/login" class="btn btn-primary">Ingresar</a>
        </ng-template>
      </div>
    </div>
  </header>
</ng-template>

<main class="app-main">
  <div class="container">
    <router-outlet></router-outlet>
  </div>
</main>

<app-cart-drawer></app-cart-drawer>

<footer class="app-footer">
  <div class="container footer-inner">
    <div class="footer-col footer-brand">
      <a class="brand" routerLink="/">Lumenstore</a>
      <p class="muted">© 2026 Lumenstore · All rights reserved</p>
    </div>

    <div class="footer-col footer-links">
      <h4>Shop</h4>
      <a routerLink="/store">Tienda</a>
      <a routerLink="/orders">Pedidos</a>
    </div>

    <div class="footer-col footer-info">
      <h4>Ayuda</h4>
      <a routerLink="/contact">Contacto</a>
      <a routerLink="/terms">Términos</a>
    </div>

    <div class="footer-col footer-newsletter">
      <h4>Suscríbete</h4>
      <form class="newsletter-form" (submit)="$event.preventDefault()">
        <input type="email" placeholder="Tu correo" aria-label="Email" />
        <button class="btn btn-sm btn-primary" type="submit">Enviar</button>
      </form>
    </div>
  </div>
</footer>
