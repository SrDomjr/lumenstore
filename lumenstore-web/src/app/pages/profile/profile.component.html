<div class="profile-container">
  <div class="profile-header">
    <div>
      <p class="eyebrow">Perfil</p>
      <h1>Mi cuenta</h1>
      <p class="profile-description">Gestiona tu información personal y actualiza tus datos.</p>
    </div>
    <span class="status" *ngIf="saved">Perfil guardado</span>
  </div>

  <form [formGroup]="profileForm" class="profile-form" (ngSubmit)="saveProfile()">
    <div class="field-group">
      <label for="firstName">Nombre</label>
      <input id="firstName" type="text" formControlName="firstName" />
      <span
        class="field-error"
        *ngIf="profileForm.get('firstName')?.touched && profileForm.get('firstName')?.invalid"
        >Requiere nombre</span
      >
    </div>

    <div class="field-group">
      <label for="lastName">Apellido</label>
      <input id="lastName" type="text" formControlName="lastName" />
      <span
        class="field-error"
        *ngIf="profileForm.get('lastName')?.touched && profileForm.get('lastName')?.invalid"
        >Requiere apellido</span
      >
    </div>

    <div class="field-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <span
        class="field-error"
        *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.invalid"
        >Email inválido</span
      >
    </div>

    <div class="actions-row">
      <button class="btn btn-primary" type="submit">Guardar cambios</button>
    </div>
  </form>
</div>
