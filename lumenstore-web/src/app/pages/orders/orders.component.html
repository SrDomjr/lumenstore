<div class="orders-container">
  <h1>My Orders</h1>

  <div *ngIf="loading" class="loading">Loading...</div>

  <div *ngIf="!loading && orders.length === 0" class="empty">
    <p>No orders yet.</p>
  </div>

  <div *ngIf="!loading && orders.length > 0" class="orders">
    <table>
      <thead>
        <tr>
          <th>Order Number</th>
          <th>Date</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.orderNumber }}</td>
          <td>{{ order.createdAt | date }}</td>
          <td>S/. {{ order.total | number: '1.2-2' }}</td>
          <td>{{ order.status }}</td>
          <td><a [routerLink]="['/orders', order.id]">View</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
