<div class="product-edit container">
  <h1 *ngIf="isNew">Crear producto</h1>
  <h1 *ngIf="!isNew">Editar producto</h1>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="form-group">
      <label>Nombre</label>
      <input formControlName="name" class="form-control" />
    </div>

    <div class="form-group">
      <label>Descripcion</label>
      <textarea formControlName="description" class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label>Precio</label>
      <input type="number" formControlName="basePrice" class="form-control" />
    </div>

    <div class="form-group">
      <label><input type="checkbox" formControlName="isActive" /> Activo</label>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="submit">Guardar</button>
      <a class="btn" routerLink="/admin/products">Cancelar</a>
    </div>
  </form>
</div>
