<div class="product-edit container">
  <div class="header-panel">
    <div>
      <span class="eyebrow">Catálogo</span>
      <h1 *ngIf="isNew">Crear producto</h1>
      <h1 *ngIf="!isNew">Editar producto #{{ productId }}</h1>
    </div>
  </div>

  <div *ngIf="loading" class="loading-panel">Cargando...</div>

  <form [formGroup]="form" (ngSubmit)="save()" *ngIf="!loading" class="edit-form">
    <div class="form-row">
      <div class="form-group flex-2">
        <label>Nombre del producto *</label>
        <input
          formControlName="name"
          class="form-control"
          placeholder="Ej: Zapatillas Running Pro"
        />
        <small class="text-danger" *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
          >El nombre es obligatorio</small
        >
      </div>
      <div class="form-group flex-1">
        <label>Slug (URL)</label>
        <input formControlName="slug" class="form-control" placeholder="zapatillas-running-pro" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group flex-1">
        <label>SKU</label>
        <input formControlName="sku" class="form-control" placeholder="ZAP-RUN-001" />
      </div>
      <div class="form-group flex-1">
        <label>Marca</label>
        <select formControlName="brandId" class="form-control">
          <option [value]="null">Seleccionar marca</option>
          <option *ngFor="let b of brands" [value]="b.id">{{ b.name }}</option>
        </select>
      </div>
      <div class="form-group flex-1">
        <label>Categoría</label>
        <select formControlName="categoryId" class="form-control">
          <option [value]="null">Seleccionar categoría</option>
          <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group flex-1">
        <label>Precio base *</label>
        <input
          type="number"
          step="0.01"
          formControlName="basePrice"
          class="form-control"
          placeholder="0.00"
        />
        <small
          class="text-danger"
          *ngIf="form.get('basePrice')?.invalid && form.get('basePrice')?.touched"
          >El precio es obligatorio</small
        >
      </div>
      <div class="form-group flex-1">
        <label>Stock</label>
        <input type="number" formControlName="stock" class="form-control" placeholder="0" />
      </div>
      <div class="form-group flex-1">
        <label>Descuento (%)</label>
        <input
          type="number"
          formControlName="discount"
          class="form-control"
          placeholder="0"
          min="0"
          max="100"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Descripción corta</label>
      <input
        formControlName="shortDescription"
        class="form-control"
        placeholder="Breve descripción para tarjetas"
      />
    </div>

    <div class="form-group">
      <label>Descripción completa</label>
      <textarea
        formControlName="description"
        class="form-control"
        rows="4"
        placeholder="Descripción detallada del producto"
      ></textarea>
    </div>

    <div class="form-row checkboxes">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="isActive" />
        Producto activo
      </label>
      <label class="checkbox-label">
        <input type="checkbox" formControlName="featured" />
        Producto destacado
      </label>
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid">
        {{ isNew ? 'Crear producto' : 'Guardar cambios' }}
      </button>
      <a class="btn btn-ghost" routerLink="/admin/products">Cancelar</a>
    </div>
  </form>
</div>
