<div class="store-container">
  <aside class="filters">
    <div class="filter-panel">
      <p class="eyebrow">Filtrar</p>
      <div class="search-card search-box">
        <label class="search-input">
          <span class="sr-only">Buscar productos</span>
          <input
            type="search"
            [(ngModel)]="query"
            name="search"
            placeholder="Estoy buscando..."
            (keyup.enter)="onSearch()"
          />
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </label>
      </div>
    </div>

    <div class="filter-group single">
      <div class="filter-heading">Precio</div>
      <div class="filter-content">
        <select class="custom-select" [(ngModel)]="priceRange" (change)="loadProducts()">
          <option value="">Cualquier precio</option>
          <option value="0-50">$0 - $50</option>
          <option value="50-150">$50 - $150</option>
          <option value="150-500">$150+</option>
          <option value="500+">$500+</option>
        </select>
      </div>
    </div>

    <div class="filter-group collapsible">
      <button
        class="toggle-header"
        type="button"
        (click)="toggleCategoryFilters()"
        aria-expanded="{{ showCategoryFilters }}"
      >
        <span>Categorías</span>
        <span class="toggle-icon" [class.expanded]="showCategoryFilters">&#9662;</span>
      </button>
      <div class="filter-options" *ngIf="showCategoryFilters">
        <button
          type="button"
          class="filter-option"
          [class.active]="!selectedCategory"
          (click)="selectedCategory = null; loadProducts()"
        >
          Todas
        </button>
        <button
          type="button"
          class="filter-option"
          *ngFor="let c of categories; trackBy: trackById"
          [class.active]="selectedCategory === c.id"
          (click)="selectedCategory = c.id; loadProducts()"
        >
          {{ c.name }}
        </button>
      </div>
    </div>

    <div class="filter-group collapsible">
      <button
        class="toggle-header"
        type="button"
        (click)="toggleBrandFilters()"
        aria-expanded="{{ showBrandFilters }}"
      >
        <span>Marcas</span>
        <span class="toggle-icon" [class.expanded]="showBrandFilters">&#9662;</span>
      </button>
      <div class="filter-options" *ngIf="showBrandFilters">
        <button
          type="button"
          class="filter-option"
          [class.active]="!selectedBrand"
          (click)="selectedBrand = null; loadProducts()"
        >
          Todas
        </button>
        <button
          type="button"
          class="filter-option"
          *ngFor="let b of brands; trackBy: trackById"
          [class.active]="selectedBrand === b.id"
          (click)="selectedBrand = b.id; loadProducts()"
        >
          {{ b.name }}
        </button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" (click)="clearFilters()">Limpiar filtros</button>
    </div>
  </aside>

  <main class="products">
    <header class="store-header">
      <div>
        <p class="eyebrow">Tienda</p>
        <h2>Disponible ahora</h2>
      </div>
      <div class="meta">
        <span>{{ products.length }} productos</span>
      </div>
    </header>

    <div *ngIf="loading" class="loading">Cargando productos...</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <div class="toast-container">
      <div class="toast success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="toast error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>

    <div class="grid" *ngIf="!loading && products.length">
      <app-product-card
        *ngFor="let p of products; trackBy: trackByProductId"
        [product]="p"
        (addToCartEvent)="addToCart($event)"
      ></app-product-card>
    </div>

    <div *ngIf="!loading && products.length === 0" class="no-results">
      No se encontraron productos.
    </div>

    <div class="pagination" *ngIf="!loading && products.length">
      <button class="btn btn-ghost" (click)="prevPage()" [disabled]="currentPage === 0">
        Anterior
      </button>
      <span>Página {{ currentPage + 1 }}</span>
      <button class="btn btn-ghost" (click)="nextPage()">Siguiente</button>
    </div>
  </main>
</div>
