<div class="login-container">
  <div class="login-card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Bienvenido de nuevo a Lumenstore</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          class="form-control"
          [class.is-invalid]="submitted && f['username']?.invalid"
          placeholder="Ingresa tu usuario"
        />
        <div *ngIf="submitted && f['username']?.invalid" class="error-message">
          <div *ngIf="f['username']?.errors?.['required']">El usuario es obligatorio</div>
          <div *ngIf="f['username']?.errors?.['minlength']">
            El usuario debe tener al menos 4 caracteres
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="submitted && f['password']?.invalid"
          placeholder="Ingresa tu contraseña"
        />
        <div *ngIf="submitted && f['password']?.invalid" class="error-message">
          <div *ngIf="f['password']?.errors?.['required']">La contraseña es obligatoria</div>
          <div *ngIf="f['password']?.errors?.['minlength']">
            La contraseña debe tener al menos 6 caracteres
          </div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading">Cargando...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Crear una</a></p>
    </div>
  </div>
</div>
