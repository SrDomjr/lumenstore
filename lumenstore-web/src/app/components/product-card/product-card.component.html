<article class="pc" role="article">
  <a [routerLink]="['/store', product.slug]" class="pc__link" [attr.aria-label]="'Ver producto ' + product.name">
    <!-- Image container -->
    <div class="pc__image">
      <img
        [src]="primaryImage | cloudinaryUrl: 400 : 'thumb'"
        [alt]="product.name"
        loading="lazy"
        class="pc__img"
      />

      <!-- Wishlist heart — top right -->
      <button
        class="pc__heart"
        [class.pc__heart--active]="isInWishlist"
        aria-label="Agregar a favoritos"
        [attr.aria-pressed]="isInWishlist"
        (click)="onWishlist($event)"
        type="button"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 21s-7-4.35-9-7.07C1.3 11.87 3.02 7.5 6.5 6.2 8.11 5.6 9.79 6 11 7c1.21-1 2.89-1.4 4.5-.8 3.48 1.3 5.2 5.67 3.5 7.73C19 16.65 12 21 12 21z"
            [attr.fill]="isInWishlist ? '#111' : 'none'"
            [attr.stroke]="isInWishlist ? '#111' : '#111'"
            stroke-width="1.5"
          />
        </svg>
      </button>

      <!-- Discount badge — top left -->
      <span class="pc__discount" *ngIf="discountPercent !== null">-{{ discountPercent }}%</span>

      <!-- Hover CTA — bottom of image -->
      <div class="pc__cta-wrap">
        <button
          class="pc__cta"
          type="button"
          (click)="onAddToCart($event)"
          [disabled]="!product.inStock && !product.hasVariants"
        >
          <span *ngIf="product.inStock && !product.hasVariants">Añadir a la bolsa</span>
          <span *ngIf="product.hasVariants">Ver opciones</span>
          <span *ngIf="!product.inStock && !product.hasVariants">Sin stock</span>
        </button>
      </div>
    </div>

    <!-- Info -->
    <div class="pc__info">
      <span class="pc__brand" *ngIf="brandName">{{ brandName }}</span>
      <h3 class="pc__name" [title]="product.name">{{ product.name }}</h3>
      <div class="pc__prices">
        <span class="pc__price">S/ {{ product.price | number: '1.2-2' }}</span>
        <span class="pc__compare" *ngIf="product.compare_at_price">S/ {{ product.compare_at_price | number: '1.2-2' }}</span>
      </div>
      <div class="pc__colors" *ngIf="product.colors && product.colors.length > 0">
        <span
          class="pc__color"
          *ngFor="let c of product.colors"
          [style.background]="c.hexCode"
          [title]="c.name"
        ></span>
      </div>
    </div>
  </a>
</article>
