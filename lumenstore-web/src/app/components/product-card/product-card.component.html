<article class="product-card" role="article">
  <div class="card-top">
    <div class="badge" *ngIf="discountPercent !== null">-{{ discountPercent }}% OFF</div>
    <div class="icon-stack">
      <button
        class="icon-btn"
        aria-label="Agregar a wishlist"
        [attr.aria-pressed]="isInWishlist"
        (click)="onWishlist($event)"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 21s-7-4.35-9-7.07C1.3 11.87 3.02 7.5 6.5 6.2 8.11 5.6 9.79 6 11 7c1.21-1 2.89-1.4 4.5-.8 3.48 1.3 5.2 5.67 3.5 7.73C19 16.65 12 21 12 21z"
            [attr.fill]="isInWishlist ? '#e4002b' : 'none'"
            [attr.stroke]="isInWishlist ? '#e4002b' : 'currentColor'"
            stroke-width="1.2"
          />
        </svg>
      </button>
      <button class="icon-btn" aria-label="Comparar producto" (click)="onCompare($event)">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M9 3v18" stroke="currentColor" stroke-width="1.2" />
          <path d="M18 6v12" stroke="currentColor" stroke-width="1.2" />
          <rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" />
          <rect
            x="15"
            y="15"
            width="6"
            height="6"
            rx="1"
            stroke="currentColor"
            stroke-width="1.2"
          />
        </svg>
      </button>
    </div>
  </div>

  <a
    [routerLink]="['/store', product.slug]"
    class="zone-a"
    aria-label="Ver producto {{ product.name }}"
  >
    <div class="image-wrap">
      <img
        [src]="product.images?.[0] || '/assets/placeholder.png'"
        alt="{{ product.name }}"
        loading="lazy"
      />
    </div>

    <div class="info">
      <div class="brand">{{ brandName | uppercase }}</div>
      <h3 class="title" title="{{ product.name }}">{{ product.name }}</h3>

      <div class="meta-row">
        <div class="rating" [class.inactive]="(product.reviewCount || 0) === 0">
          <span class="stars">
            <ng-container *ngFor="let s of [1, 2, 3, 4, 5]; let i = index">
              <svg class="star" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                <path
                  d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.79 1.402 8.168L12 18.896l-7.336 3.872 1.402-8.168L.132 9.21l8.2-1.192z"
                  [attr.fill]="(product.reviewCount || 0) === 0 ? '#e6e9ee' : '#F5C25B'"
                ></path>
              </svg>
            </ng-container>
          </span>
          <span class="rating-text" *ngIf="(product.reviewCount || 0) > 0"
            >{{ avgRating }} ({{ product.reviewCount }})</span
          >
          <span class="rating-muted" *ngIf="(product.reviewCount || 0) === 0">Sin reseñas</span>
        </div>
      </div>

      <div class="price-row">
        <div class="price">S/. {{ product.price | number: '1.2-2' }}</div>
        <div class="compare" *ngIf="product.compare_at_price">
          S/. {{ product.compare_at_price | number: '1.2-2' }}
        </div>
      </div>
    </div>
  </a>

  <div class="zone-b">
    <button
      class="cta"
      [class.outline]="product.hasVariants"
      (click)="onAddToCart($event)"
      [disabled]="!product.inStock && !product.hasVariants"
    >
      <svg
        *ngIf="product.inStock && !product.hasVariants"
        class="cart-icon"
        width="18"
        height="18"
        viewBox="0 0 24 24"
      >
        <path
          d="M3 3h2l.4 2M7 13h10l4-8H5.4"
          stroke="currentColor"
          stroke-width="1.4"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span *ngIf="product.inStock && !product.hasVariants">Agregar al carrito</span>
      <span *ngIf="product.hasVariants">Ver opciones</span>
      <span *ngIf="!product.inStock && !product.hasVariants">Sin stock</span>
    </button>
  </div>
</article>
